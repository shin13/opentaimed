# Pre-commit hooks for OpenTaiMed.
#
# Setup once per clone:
#   brew install pre-commit          # or: pip install pre-commit
#   pre-commit install               # wires hook into .git/hooks/pre-commit
#
# Hooks run automatically on `git commit`. To run manually against all files:
#   pre-commit run --all-files
#
# Update pinned versions:
#   pre-commit autoupdate

repos:
  # Detect hardcoded secrets (API keys, tokens, private keys) before they
  # reach commit history. See SECURITY.md for our private-disclosure policy.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)
