# path: docker-compose.yml
# brief: Shared HTTP MCP service (internal-only) behind a Caddy TLS edge (ADR-0010 Stage 1).

services:
  mcp:
    build: .
    restart: unless-stopped
    env_file: .env            # operators tune throttle / TTL / volume here
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0  # bind inside container only; NOT published to host
      MCP_HTTP_PORT: "8765"
    networks: [internal]
    # No `ports:` — the app is never reachable except through the proxy
    # (security invariant #8).
    # Do NOT add `deploy.replicas` / scale this service: it is single-instance
    # only — its cache/refresh/lock state is per-process. Two replicas silently
    # break dedup and double TFDA egress (ADR-0010 §Decision-2; Redis first).
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8765/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  proxy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [mcp]
    ports:
      - "443:443"             # the ONLY published port (bind to the hospital LAN IP at deploy)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro     # hospital internal-CA cert + key mounted here
    networks: [internal]

networks:
  internal:
    driver: bridge
