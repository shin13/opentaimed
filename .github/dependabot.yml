# Dependabot configuration.
#
# NOTE: Dependabot *security* updates run WITHOUT this file (enabled in repo
# settings) and already land `chore(deps)` CVE-fix PRs. This file adds two
# things on top:
#   1. routine (non-security) version-bump PRs for the Python runtime deps, and
#   2. the `github-actions` ecosystem, which keeps the commit-SHA pins in
#      .github/workflows/ current (SHA + the trailing `# vX.Y.Z` comment).
#
# Without (2), pinning actions by SHA would silently freeze them at whatever
# version was pinned — Dependabot is what makes SHA-pinning maintainable.
version: 2
updates:
  # Python runtime deps (uv). Minor + patch are grouped into one weekly PR to
  # keep volume low; majors come as individual PRs for deliberate review.
  - package-ecosystem: "uv"
    directory: "/taiwan-fda-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "20:00"
      timezone: "Asia/Taipei"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions — keeps the SHA pins in .github/workflows/ fresh. Minor +
  # patch grouped; a new major (e.g. checkout v7 -> v8) arrives as its own PR
  # so runtime/breaking-change bumps get reviewed one at a time.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "20:00"
      timezone: "Asia/Taipei"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
