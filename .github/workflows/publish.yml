name: publish

# Publish taiwan-fda-mcp to PyPI on a version tag (e.g. `v0.2.0`).
#
# Uses PyPI Trusted Publishing (OIDC): no API token is stored in the repo or
# in secrets. PyPI verifies the workflow's short-lived OIDC identity instead.
# One-time setup on PyPI: add a Trusted Publisher for project `taiwan-fda-mcp`
# pointing at owner `shin13`, repo `opentaimed`, workflow `publish.yml`,
# environment `pypi`.
#
# Hardening note: every `uses:` below is pinned to a full commit SHA (with a
# trailing `# vX.Y.Z` for readability) — especially the publish action, which
# carries the OIDC identity. Dependabot's `github-actions` ecosystem
# (.github/dependabot.yml) keeps these SHAs current.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taiwan-fda-mcp
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: taiwan-fda-mcp/uv.lock

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Build sdist + wheel
        run: uv build

      - name: Upload distributions artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: taiwan-fda-mcp/dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment is the trust anchor for OIDC publishing and the
    # natural place to attach a manual-approval protection rule later.
    environment:
      name: pypi
      url: https://pypi.org/project/taiwan-fda-mcp/
    permissions:
      # Mint the short-lived OIDC token Trusted Publishing exchanges for an
      # upload credential. No long-lived token is stored anywhere.
      id-token: write
    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
