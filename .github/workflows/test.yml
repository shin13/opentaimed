name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege: this CI only reads code and runs unit tests. It does not
# write to the repo, push images, or call external services with credentials.
# Explicit `contents: read` overrides the default `contents: write` token that
# GitHub Actions would otherwise grant, closing a supply-chain attack path
# where a compromised dependency or action could push to the repo.
permissions:
  contents: read

jobs:
  taiwan-fda-mcp:
    name: taiwan-fda-mcp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taiwan-fda-mcp

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: taiwan-fda-mcp/uv.lock

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (pyright)
        run: uv run pyright src

      - name: Unit tests (pytest)
        # Default pytest config excludes the `integration` marker, so this
        # is a no-network run safe for CI.
        run: uv run pytest -v
